name: CI — MicroKit.Result

on:
  push:
    branches: [main, dev]
    paths:
      - 'modules/MicroKit.Result/**'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
  pull_request:
    branches: [main, dev]
    paths:
      - 'modules/MicroKit.Result/**'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore modules/MicroKit.Result/MicroKit.Result.slnx

      - name: Build
        run: dotnet build modules/MicroKit.Result/MicroKit.Result.slnx --no-restore -c Release

      - name: Test
        run: |
          dotnet test modules/MicroKit.Result/MicroKit.Result.slnx \
            --no-build -c Release \
            --logger "trx;LogFileName=results.trx" \
            --results-directory testresults \
            --collect:"XPlat Code Coverage"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-result
          path: testresults/
