name: CI — MicroKit.Execution.Abstractions

on:
  push:
    branches: [main, dev]
    paths:
      - 'modules/MicroKit.Execution.Abstractions/**'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
  pull_request:
    branches: [main, dev]
    paths:
      - 'modules/MicroKit.Execution.Abstractions/**'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore modules/MicroKit.Execution.Abstractions/MicroKit.Execution.Abstractions.slnx

      - name: Build
        run: dotnet build modules/MicroKit.Execution.Abstractions/MicroKit.Execution.Abstractions.slnx --no-restore -c Release
