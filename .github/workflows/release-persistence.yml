name: Release — MicroKit.Persistence

on:
  push:
    tags:
      - 'persistence-v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore modules/MicroKit.Persistence/MicroKit.Persistence.slnx

      - name: Build
        run: dotnet build modules/MicroKit.Persistence/MicroKit.Persistence.slnx --no-restore -c Release

      - name: Test
        run: dotnet test modules/MicroKit.Persistence/MicroKit.Persistence.slnx --no-build -c Release

      - name: Pack
        run: |
          dotnet pack modules/MicroKit.Persistence/MicroKit.Persistence.slnx \
            --no-build -c Release \
            -o nupkgs

      - name: Push to NuGet.org
        run: |
          dotnet nuget push nupkgs/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
