name: Release — MicroKit.Persistence

on:
  push:
    tags:
      - 'persistence-v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Extract version from tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PACKAGE_VERSION="${TAG#persistence-v}"
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> "$GITHUB_ENV"

      # CIReleaseBuild=true replaces cross-module ProjectReferences with PackageReferences
      # (MicroKit.Result, MicroKit.Domain) so that:
      #   - Restore resolves the published NuGet versions from Directory.Packages.props
      #   - Build compiles against those published packages (ABI verification)
      #   - Pack emits the correct nuspec dependency versions
      # Prerequisites: MicroKit.Result and MicroKit.Domain must be published to NuGet.org
      # at the versions declared in Directory.Packages.props before this workflow is triggered.
      - name: Restore
        run: dotnet restore modules/MicroKit.Persistence/MicroKit.Persistence.slnx -p:CIReleaseBuild=true

      - name: Build
        run: dotnet build modules/MicroKit.Persistence/MicroKit.Persistence.slnx --no-restore -c Release -p:CIReleaseBuild=true

      - name: Test
        run: dotnet test modules/MicroKit.Persistence/MicroKit.Persistence.slnx --no-build -c Release

      - name: Pack
        run: |
          dotnet pack modules/MicroKit.Persistence/MicroKit.Persistence.slnx \
            --no-build -c Release \
            -p:CIReleaseBuild=true \
            -p:PackageVersion=${{ env.PACKAGE_VERSION }} \
            -p:AssemblyVersion=$(echo "${{ env.PACKAGE_VERSION }}" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+').0 \
            -o nupkgs

      - name: Push to NuGet.org
        run: |
          dotnet nuget push nupkgs/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
