name: Release — MicroKit.Multitenancy

on:
  push:
    tags:
      - 'multitenancy-v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Extract version from tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PACKAGE_VERSION="${TAG#multitenancy-v}"
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> "$GITHUB_ENV"

      - name: Restore
        run: dotnet restore modules/MicroKit.Multitenancy/MicroKit.Multitenancy.slnx

      - name: Build
        run: dotnet build modules/MicroKit.Multitenancy/MicroKit.Multitenancy.slnx --no-restore -c Release

      - name: Test
        run: dotnet test modules/MicroKit.Multitenancy/MicroKit.Multitenancy.slnx --no-build -c Release

      - name: Pack
        run: |
          dotnet pack modules/MicroKit.Multitenancy/MicroKit.Multitenancy.slnx \
            --no-build -c Release \
            -p:PackageVersion=${{ env.PACKAGE_VERSION }} \
            -o nupkgs

      - name: Push to NuGet.org
        run: |
          dotnet nuget push nupkgs/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
